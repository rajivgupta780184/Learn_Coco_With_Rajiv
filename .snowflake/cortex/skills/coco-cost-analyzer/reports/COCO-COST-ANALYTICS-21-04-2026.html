<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoCo Usage Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--sf-blue:#29B5E8;--cli:#F5A623;--sg:#48D7A4;--bg:#080E14;--surface:#0F1923;--surface2:#162231;--border:rgba(41,181,232,0.12);--text:#E8F4FD;--muted:#5A7A95;--danger:#FF5757}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:linear-gradient(rgba(41,181,232,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(41,181,232,0.03) 1px,transparent 1px);background-size:40px 40px}
.header{padding:24px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.header h1 span{color:var(--sf-blue)}
.header .meta{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted)}
.controls{padding:16px 32px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border)}
.btn{font-family:'Space Mono',monospace;font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .2s}
.btn:hover{border-color:var(--sf-blue);color:var(--text)}
.btn.active-cli{background:var(--cli);color:#080E14;border-color:var(--cli)}
.btn.active-sg{background:var(--sg);color:#080E14;border-color:var(--sg)}
.tab-bar{padding:0 32px;display:flex;gap:0;border-bottom:1px solid var(--border)}
.tab{font-family:'Space Mono',monospace;font-size:13px;padding:12px 24px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active-cli{color:var(--cli);border-bottom-color:var(--cli)}
.tab.active-sg{color:var(--sg);border-bottom-color:var(--sg)}
.custom-range{display:none;align-items:center;gap:8px}
.custom-range.show{display:flex}
.custom-range input[type=date]{font-family:'Space Mono',monospace;font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.content{padding:24px 32px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.kpi .label{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.kpi .value{font-size:24px;font-weight:700;font-family:'Space Mono',monospace}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:4px}
.section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px}
.section h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--muted);font-family:'Space Mono',monospace}
.chart-container{position:relative;height:280px}
table{width:100%;border-collapse:collapse;font-size:12px;font-family:'Space Mono',monospace}
th{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:400;text-transform:uppercase;font-size:10px;letter-spacing:0.5px}
td{padding:8px 12px;border-bottom:1px solid rgba(41,181,232,0.06)}
tr:hover td{background:rgba(41,181,232,0.04)}
.no-data{text-align:center;padding:60px 20px;color:var(--muted);font-family:'Space Mono',monospace;font-size:14px}
</style>
</head>
<body>
<div class="header">
  <h1><span>CoCo</span> Usage Analytics</h1>
  <div class="meta">Generated 21-04-2026 | Last 90 days</div>
</div>
<div class="controls" id="rangeBar">
  <button class="btn" data-days="7">7D</button>
  <button class="btn" data-days="15">15D</button>
  <button class="btn active-sg" data-days="30">30D</button>
  <button class="btn" data-days="45">45D</button>
  <button class="btn" data-days="60">60D</button>
  <button class="btn" data-days="90">90D</button>
  <button class="btn" data-days="0">Custom</button>
  <div class="custom-range" id="customRange">
    <input type="date" id="fromDate"> <span style="color:var(--muted)">to</span> <input type="date" id="toDate">
    <button class="btn" id="applyCustom">Apply</button>
  </div>
</div>
<div class="tab-bar">
  <div class="tab active-sg" data-src="snowsight">Snowsight</div>
  <div class="tab" data-src="cli">CLI</div>
</div>
<div class="content">
  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="section"><h3>Token Usage Over Time</h3><div class="chart-container"><canvas id="tokenLineChart"></canvas></div></div>
  <div class="section"><h3>Token Type Breakdown (Stacked)</h3><div class="chart-container"><canvas id="tokenStackedBar"></canvas></div></div>
  <div class="section"><h3>Token Credits Over Time</h3><div class="chart-container"><canvas id="creditAreaChart"></canvas></div></div>
  <div class="section"><h3>Credit Breakdown by Token Type</h3><div class="chart-container"><canvas id="creditBreakdownBar"></canvas></div></div>
  <div class="section"><h3>Model Usage Comparison</h3><div class="chart-container"><canvas id="modelBar"></canvas></div></div>
  <div class="section"><h3>Per-User Token Consumption</h3><div class="chart-container"><canvas id="userBar"></canvas></div></div>
  <div class="section"><h3>Usage Detail Table</h3><div style="overflow-x:auto"><table id="detailTable"></table></div></div>
</div>
<script>
const snowsightData=[
  {date:"2026-04-21",userId:1,model:"claude-opus-4-6",totalTokens:3894124,totalTokenCredits:2.22432868,inputTokens:174,outputTokens:30890,cacheReadTokens:3636017,cacheWriteTokens:227043,inputCredits:0.0004785,outputCredits:0.4247375,cacheReadCredits:1.01808476,cacheWriteCredits:0.78102792},
  {date:"2026-04-10",userId:1,model:"claude-opus-4-6",totalTokens:265369,totalTokenCredits:0.13194463,inputTokens:14,outputTokens:1203,cacheReadTokens:251050,cacheWriteTokens:13102,inputCredits:0.0000385,outputCredits:0.01654125,cacheReadCredits:0.070294,cacheWriteCredits:0.04507088}
];
const cliData=[
  {date:"2026-04-21",userId:1,model:"claude-sonnet-4-6",totalTokens:427,totalTokenCredits:0.00095535,inputTokens:389,outputTokens:38,cacheReadTokens:0,cacheWriteTokens:0,inputCredits:0.00064185,outputCredits:0.0003135,cacheReadCredits:0,cacheWriteCredits:0},
  {date:"2026-04-10",userId:1,model:"claude-opus-4-6",totalTokens:3720082,totalTokenCredits:1.71151525,inputTokens:104,outputTokens:17395,cacheReadTokens:3564822,cacheWriteTokens:137761,inputCredits:0.000286,outputCredits:0.23918125,cacheReadCredits:0.99815016,cacheWriteCredits:0.47389784},
  {date:"2026-04-10",userId:1,model:"claude-sonnet-4-5",totalTokens:166,totalTokenCredits:0.0004323,inputTokens:142,outputTokens:24,cacheReadTokens:0,cacheWriteTokens:0,inputCredits:0.0002343,outputCredits:0.000198,cacheReadCredits:0,cacheWriteCredits:0}
];

const MODEL_COLORS=['#F5A623','#29B5E8','#48D7A4','#E84292','#9B59B6','#E74C3C'];
const TT_COLORS={input:'#29B5E8',output:'#48D7A4',cacheRead:'#F5A623',cacheWrite:'#E84292'};
let currentSrc='snowsight',currentDays=30,charts={};

function getData(){return currentSrc==='snowsight'?snowsightData:cliData}
function accentClass(){return currentSrc==='cli'?'active-cli':'active-sg'}
function accent(){return currentSrc==='cli'?'#F5A623':'#48D7A4'}

function filterByRange(rows,days,fromDate,toDate){
  const now=new Date();now.setHours(23,59,59,999);
  const from=fromDate?new Date(fromDate):new Date(+now-days*864e5);
  const to=toDate?new Date(toDate):now;
  return rows.filter(r=>{const d=new Date(r.date);return d>=from&&d<=to});
}

function fmt(n){if(n==null||isNaN(n))return'0';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return typeof n==='number'&&n%1?n.toFixed(6):String(n)}

function renderKPIs(data){
  const g=document.getElementById('kpiGrid');
  if(!data.length){g.innerHTML='<div class="no-data" style="grid-column:1/-1">No data available for selected range</div>';return}
  const sum=(fn)=>data.reduce((s,r)=>s+fn(r),0);
  const totTok=sum(r=>r.totalTokens);
  const totCred=sum(r=>r.totalTokenCredits);
  const totIn=sum(r=>r.inputTokens);
  const totOut=sum(r=>r.outputTokens);
  const totCR=sum(r=>(r.cacheReadTokens||0));
  const totCW=sum(r=>(r.cacheWriteTokens||0));
  const totCredAll=sum(r=>(r.inputCredits||0)+(r.outputCredits||0)+(r.cacheReadCredits||0)+(r.cacheWriteCredits||0));
  const models={};data.forEach(r=>{models[r.model]=(models[r.model]||0)+r.totalTokens});
  const topModel=Object.entries(models).sort((a,b)=>b[1]-a[1])[0];
  const kpis=[
    {l:'Total Tokens',v:fmt(totTok)},{l:'Token Credits',v:totCred.toFixed(6)},
    {l:'Input Tokens',v:fmt(totIn)},{l:'Output Tokens',v:fmt(totOut)},
    {l:'Cache Read',v:fmt(totCR)},{l:'Cache Write',v:fmt(totCW)},
    {l:'Total Credits',v:totCredAll.toFixed(6)},{l:'Top Model',v:topModel?topModel[0]:'N/A',small:true}
  ];
  g.innerHTML=kpis.map(k=>`<div class="kpi"><div class="label">${k.l}</div><div class="value" style="font-size:${k.small?'13px':'24px'};color:${k.l==='Total Credits'?accent():'var(--text)'}">${k.v}</div></div>`).join('');
}

function destroyCharts(){Object.values(charts).forEach(c=>{if(c&&c.destroy)c.destroy()});charts={}}

function chartDefaults(){
  const grid={color:'rgba(41,181,232,0.08)'};
  return{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#5A7A95',font:{family:'Space Mono',size:11}}}},scales:{x:{ticks:{color:'#5A7A95',font:{family:'Space Mono',size:10}},grid:grid},y:{ticks:{color:'#5A7A95',font:{family:'Space Mono',size:10}},grid:grid}}};
}

function buildCharts(data){
  destroyCharts();
  if(!data.length){document.querySelectorAll('.section .chart-container').forEach(c=>{c.innerHTML='<div class="no-data">No data available</div>'});document.getElementById('detailTable').innerHTML='<div class="no-data">No data available</div>';return}
  const opts=chartDefaults();
  const dates=[...new Set(data.map(r=>r.date))].sort();

  const agg=(dates,fn)=>dates.map(d=>data.filter(r=>r.date===d).reduce((s,r)=>s+fn(r),0));

  charts.tokenLine=new Chart(document.getElementById('tokenLineChart'),{type:'line',data:{labels:dates,datasets:[{label:'Total Tokens',data:agg(dates,r=>r.totalTokens),borderColor:accent(),backgroundColor:accent()+'33',fill:true,tension:.3,pointRadius:4}]},options:opts});

  charts.tokenStacked=new Chart(document.getElementById('tokenStackedBar'),{type:'bar',data:{labels:dates,datasets:[
    {label:'Input',data:agg(dates,r=>r.inputTokens),backgroundColor:TT_COLORS.input},
    {label:'Output',data:agg(dates,r=>r.outputTokens),backgroundColor:TT_COLORS.output},
    {label:'Cache Read',data:agg(dates,r=>r.cacheReadTokens||0),backgroundColor:TT_COLORS.cacheRead},
    {label:'Cache Write',data:agg(dates,r=>r.cacheWriteTokens||0),backgroundColor:TT_COLORS.cacheWrite}
  ]},options:{...opts,scales:{x:{...opts.scales.x,stacked:true},y:{...opts.scales.y,stacked:true}}}});

  charts.creditArea=new Chart(document.getElementById('creditAreaChart'),{type:'line',data:{labels:dates,datasets:[{label:'Token Credits',data:agg(dates,r=>r.totalTokenCredits),borderColor:accent(),backgroundColor:accent()+'33',fill:true,tension:.3,pointRadius:4}]},options:opts});

  charts.creditBreakdown=new Chart(document.getElementById('creditBreakdownBar'),{type:'bar',data:{labels:dates,datasets:[
    {label:'Input Credits',data:agg(dates,r=>r.inputCredits||0),backgroundColor:TT_COLORS.input},
    {label:'Output Credits',data:agg(dates,r=>r.outputCredits||0),backgroundColor:TT_COLORS.output},
    {label:'Cache Read Credits',data:agg(dates,r=>r.cacheReadCredits||0),backgroundColor:TT_COLORS.cacheRead},
    {label:'Cache Write Credits',data:agg(dates,r=>r.cacheWriteCredits||0),backgroundColor:TT_COLORS.cacheWrite}
  ]},options:{...opts,scales:{x:{...opts.scales.x,stacked:true},y:{...opts.scales.y,stacked:true}}}});

  const models=[...new Set(data.map(r=>r.model))];
  charts.modelBar=new Chart(document.getElementById('modelBar'),{type:'bar',data:{labels:dates,datasets:models.map((m,i)=>({label:m,data:dates.map(d=>data.filter(r=>r.date===d&&r.model===m).reduce((s,r)=>s+r.totalTokens,0)),backgroundColor:MODEL_COLORS[i%MODEL_COLORS.length]}))},options:opts});

  const users={};data.forEach(r=>{const k='User '+r.userId;users[k]=(users[k]||0)+r.totalTokens});
  const sorted=Object.entries(users).sort((a,b)=>b[1]-a[1]);
  charts.userBar=new Chart(document.getElementById('userBar'),{type:'bar',data:{labels:sorted.map(u=>u[0]),datasets:[{label:'Total Tokens',data:sorted.map(u=>u[1]),backgroundColor:accent()}]},options:{...opts,indexAxis:'y'}});

  const tbl=document.getElementById('detailTable');
  tbl.innerHTML='<thead><tr><th>Date</th><th>User</th><th>Model</th><th>Total Tokens</th><th>Input</th><th>Output</th><th>Cache Read</th><th>Cache Write</th><th>Token Credits</th><th>Total Credits</th></tr></thead><tbody>'+
    data.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>{
      const tc=(r.inputCredits||0)+(r.outputCredits||0)+(r.cacheReadCredits||0)+(r.cacheWriteCredits||0);
      return`<tr><td>${r.date}</td><td>${r.userId}</td><td>${r.model}</td><td>${fmt(r.totalTokens)}</td><td>${fmt(r.inputTokens)}</td><td>${fmt(r.outputTokens)}</td><td>${fmt(r.cacheReadTokens||0)}</td><td>${fmt(r.cacheWriteTokens||0)}</td><td>${r.totalTokenCredits.toFixed(6)}</td><td>${tc.toFixed(6)}</td></tr>`}).join('')+'</tbody>';
}

function refresh(){
  const from=document.getElementById('fromDate').value;
  const to=document.getElementById('toDate').value;
  const filtered=currentDays===0?filterByRange(getData(),0,from,to):filterByRange(getData(),currentDays);
  renderKPIs(filtered);buildCharts(filtered);
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    currentSrc=t.dataset.src;
    document.querySelectorAll('.tab').forEach(x=>x.className='tab');
    t.classList.add('tab',accentClass());
    document.querySelectorAll('#rangeBar .btn[data-days]').forEach(b=>{
      if(b.classList.contains('active-cli')||b.classList.contains('active-sg')){b.classList.remove('active-cli','active-sg');b.classList.add(accentClass())}
    });
    refresh();
  });
});

document.querySelectorAll('#rangeBar .btn[data-days]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('#rangeBar .btn[data-days]').forEach(x=>x.classList.remove('active-cli','active-sg'));
    const days=parseInt(b.dataset.days);
    if(days===0){document.getElementById('customRange').classList.add('show');b.classList.add(accentClass());return}
    document.getElementById('customRange').classList.remove('show');
    currentDays=days;b.classList.add(accentClass());refresh();
  });
});

document.getElementById('applyCustom').addEventListener('click',()=>{currentDays=0;refresh()});

refresh();
</script>
</body>
</html>
